name: CI

on:
  push:
    branches: [main, 'v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    # Routes the heavy Tauri+PDFium compile to the remote Docker daemon (10.0.23.137)
    # via DOCKER_HOST. BuildKit cache mounts in the Dockerfile persist apt and cargo
    # caches between runs on that daemon, making subsequent CI runs fast.
    # The first run is slow (full apt + cargo compile); subsequent runs skip both.
    runs-on: ubuntu-latest
    env:
      DOCKER_HOST: tcp://10.0.23.137:2375
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          apt-get update -qq
          apt-get install -y -qq docker.io > /dev/null 2>&1
          echo "Docker CLI version: $(docker --version)"
          echo "DOCKER_HOST: $DOCKER_HOST"
          docker info --format 'Remote daemon: {{.ServerVersion}} OS={{.OperatingSystem}}'

      - name: Build and run tests
        run: |
          docker build \
            --network=host \
            --progress=plain \
            -t redline-test \
            -f .forgejo/Dockerfile.test-rust \
            .

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_cache: ~/.npm

      - name: Run frontend tests
        run: npm test

      - name: Svelte type check
        run: npm run check
