name: CI

on:
  push:
    branches: [main, 'v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    # ubuntu-latest is the only runner label confirmed available for this repo
    # (test-frontend uses it and passes; the rust-1.89 label is not registered here
    # and failed to schedule in ~2s). The runner container is root, so no sudo, and
    # external setup actions (dtolnay/rust-toolchain, actions/cache) do not resolve -
    # install everything with plain run-steps, matching the mindmulch CI pattern.
    runs-on: ubuntu-latest
    steps:
      - name: Install build prerequisites + Tauri/PDFium system deps
        # The redline crate links the Tauri 2 webview (webkit2gtk 4.1) on Linux, so
        # even `cargo test` must compile against the GTK/webkit system libs.
        # Package list per https://v2.tauri.app/start/prerequisites/. No sudo: root.
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            git curl ca-certificates \
            libwebkit2gtk-4.1-dev \
            build-essential \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Checkout
        run: |
          git init -q && git remote add origin https://forge.mms.name/${GITHUB_REPOSITORY}.git
          git fetch -q --depth 1 origin ${GITHUB_SHA} && git checkout -q FETCH_HEAD

      - name: Install Rust toolchain (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run Rust tests
        # `cargo test --lib` runs all 148 lib tests while skipping the `bench` and
        # `main` binary targets and doc-tests (zero tests in those) - that roughly
        # halves the compile/link load so the build fits the runner. Source cargo env
        # explicitly in case $GITHUB_PATH propagation is not honored by the runner.
        # Single codegen unit + thin LTO off keeps peak linker memory down.
        run: |
          . "$HOME/.cargo/env"
          cargo test --lib -p redline
        env:
          RUST_LOG: warn
          CARGO_NET_RETRY: "5"
          CARGO_PROFILE_TEST_DEBUG: "0"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_cache: ~/.npm

      - name: Run frontend tests
        run: npm test

      - name: Svelte type check
        run: npm run check
